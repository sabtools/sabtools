<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Icon: Circle with tools symbol -->
  <circle cx="45" cy="50" r="35" fill="url(#g1)"/>
  <!-- Wrench + S combined -->
  <text x="45" y="62" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="900" fill="white" text-anchor="middle">S</text>
  <!-- Small tool dots -->
  <circle cx="25" cy="30" r="4" fill="#FCD34D"/>
  <circle cx="65" cy="30" r="4" fill="#34D399"/>
  <circle cx="65" cy="70" r="4" fill="#60A5FA"/>
  <!-- Text: SabTools.in -->
  <text x="95" y="42" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="800" fill="#1F2937">Sab</text>
  <text x="152" y="42" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="800" fill="#7C3AED">Tools</text>
  <text x="258" y="42" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="400" fill="#9CA3AF">.in</text>
  <!-- Underline accent -->
  <rect x="95" y="52" width="80" height="3" rx="1.5" fill="#7C3AED" opacity="0.3"/>
  <!-- Tagline -->
  <text x="95" y="72" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#9CA3AF" letter-spacing="1.5">300+ FREE TOOLS FOR INDIA</text>
</svg>
